{% extends "base.html" %}

{% block title %}註冊{% endblock %}

{% block content %}
<article>
    <h1>會員註冊</h1>

    <form method="post">
        <label>
            帳號
            <input type="text" name="username" required>
        </label>

        <label>
            Email
            <input type="email" name="email" required>
        </label>

        <label>
            密碼
            <input type="password" name="password" minlength="6" maxlength="16" required>
        </label>

        <label>
            電話
            <input type="text" name="phone" placeholder="可不填，例如 0912345678">
        </label>

        <label>
            出生日期
            <input type="date" name="birthdate" required>
        </label>

        <button type="submit">註冊</button>
        <a href="{{ url_for('index') }}" role="button" class="secondary">回首頁</a>
    </form>
</article>
{% endblock %}
